services:
  dnstt-server:
    build:
      context: .
      target: server
    restart: unless-stopped
    ports:
      - "53:53/udp"
    volumes:
      - ./keys:/keys:ro
    # Run as nobody:nogroup (uid/gid 65534). Keys generated by the keygen
    # service below are owned by this user, so no root access is required.
    user: "65534:65534"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # required to bind port 53
    # Default: built-in SOCKS5 proxy. To forward to an existing service instead,
    # remove "-socks5" and append the upstream address, e.g. "127.0.0.1:8000".
    command:
      - -udp
      - ":53"
      - -privkey-file
      - /keys/server.key
      - -socks5
      - "${DNSTT_DOMAIN:?DNSTT_DOMAIN is required (e.g. t.example.com)}"

  # Key generation (run once):
  #   docker compose run --rm keygen
  # Keys are written to ./keys/ owned by uid 65534 so the server can read them.
  keygen:
    build:
      context: .
      target: server
    user: "65534:65534"
    volumes:
      - ./keys:/keys
    command:
      - -gen-key
      - -privkey-file
      - /keys/server.key
      - -pubkey-file
      - /keys/server.pub
    profiles:
      - keygen
